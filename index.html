<!DOCTYPE html>
<html>
<head>
    <title>LoveChat</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f0f0; transition: background 0.5s; }
        #chat { width: 80%; max-width: 400px; height: 300px; border: 1px solid #ccc; margin: 20px auto; overflow-y: scroll; background: white; }
        .msg { padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h1>LoveChat</h1>
    
    <button onclick="moryap()">Purple Tema</button>
    <button onclick="siyahYap()">Dark Tema</button>
    <button onclick="renkDegistir()">Random</button>
    
    <div id="chat"></div>
    <br>
    <input type="text" id="msg" placeholder="Mesaj yaz...">
    <button onclick="gonder()">Gönder</button>

    <script>
        function gonder(){
            let text = document.getElementById("msg").value;
            if(text == "") return;
            let div = document.createElement("div");
            div.className = "msg";
            div.innerText = text;
            document.getElementById("chat").appendChild(div);
            document.getElementById("msg").value = "";
        }
        function moryap(){ document.body.style.background = "#6a0dad"; }
        function siyahYap(){ document.body.style.background = "#111"; }
        function renkDegistir(){ 
            let renk = "#" + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.background = renk;
        }
    </script>

    <script src="//code.tidio.co/w5qqujhgbfbepa2wxbleqlibzkjmfio.js" async></script>

</body>
</html>
