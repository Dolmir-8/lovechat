<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LoveChat</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>LoveChat Sohbet Sayfası</h1>

    <button onclick="moryap()">Purple Tema</button>
    <button onclick="siyahYap()">Dark Tema</button>
    <button onclick="renkDegistir()">Random</button>

    <br><br>

    <div id="chat-container">
        <iframe src="https://www5.cbox.ws/box/?boxid=964053&boxtag=tzVVD6" width="100%" height="450" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>
    </div>

    <script>
        function moryap() { document.body.style.background = "purple"; }
        function siyahYap() { document.body.style.background = "black"; }
        function renkDegistir() {
            let renks = "#" + Math.floor(Math.random()*16777215).toString(16);
            document.body.style.background = renks;
        }
    </script>

</body>
</html>
